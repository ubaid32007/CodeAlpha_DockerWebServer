version: '3.8'

services:
  webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codealpha-webserver
    ports:
      - "8080:80"        # Access at http://localhost:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./html:/usr/share/nginx/html:ro   # Live reload for dev
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
