<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeAlpha | Docker Web Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 40px 20px; }
    .badge {
      display: inline-block;
      background: #00c8ff22;
      border: 1px solid #00c8ff55;
      color: #00c8ff;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 999px;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }
    h1 { font-size: 3rem; font-weight: 700; color: #fff; margin-bottom: 12px; }
    h1 span { color: #00c8ff; }
    p { font-size: 1.1rem; color: #aaa; max-width: 500px; margin: 0 auto 40px; line-height: 1.7; }
    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px 28px;
      min-width: 160px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #00c8ff55; }
    .card .icon { font-size: 2rem; margin-bottom: 10px; }
    .card .label { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .card .value { font-size: 1.1rem; font-weight: 600; color: #fff; margin-top: 4px; }
    .footer { font-size: 0.85rem; color: #555; }
    .footer span { color: #00c8ff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">🐳 RUNNING IN DOCKER</div>
    <h1>Hello from <span>CodeAlpha</span></h1>
    <p>This web server is containerized with Docker and served via Nginx. Part of the CodeAlpha DevOps Internship — Task 4.</p>
    <div class="cards">
      <div class="card">
        <div class="icon">🐳</div>
        <div class="label">Runtime</div>
        <div class="value">Docker</div>
      </div>
      <div class="card">
        <div class="icon">⚡</div>
        <div class="label">Server</div>
        <div class="value">Nginx</div>
      </div>
      <div class="card">
        <div class="icon">🌐</div>
        <div class="label">Port</div>
        <div class="value">80</div>
      </div>
      <div class="card">
        <div class="icon">✅</div>
        <div class="label">Status</div>
        <div class="value">Online</div>
      </div>
    </div>
    <div class="footer">CodeAlpha DevOps Internship &nbsp;|&nbsp; <span>Task 4: Web Server using Docker</span></div>
  </div>
</body>
</html>
